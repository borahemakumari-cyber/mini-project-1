<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Forecast Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="weather-container">
        <h1>🌤 Weather Forecast Dashboard</h1>

        <div class="search-box">
            <input type="text" placeholder="Enter City Name">
            <button>Search</button>
        </div>

        <div class="weather-card">
            <h2>Hyderabad</h2>
            <h3>28°C</h3>
            <p>Partly Cloudy</p>
            <p>Humidity: 65%</p>
            <p>Wind Speed: 12 km/h</p>
        </div>

        <div class="forecast">
            <div class="day">
                <h4>Mon</h4>
                <p>30°C</p>
            </div>

            <div class="day">
                <h4>Tue</h4>
                <p>29°C</p>
            </div>

            <div class="day">
                <h4>Wed</h4>
                <p>31°C</p>
            </div>

            <div class="day">
                <h4>Thu</h4>
                <p>27°C</p>
            </div>

            <div class="day">
                <h4>Fri</h4>
                <p>29°C</p>
            </div>
        </div>
    </div>

</body>
</html>
